# qmd Configuration

# Directory to index
wiki_dir: wiki

# Auto-generated index location
index_path: config/qmd-index

# Search settings
search:
  max_results: 20
  snippet_length: 200

# Note: qmd needs to be built from source (Rust/cargo)
# See: https://github.com/tobi/qmd
# Installation:
#   curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh
#   cargo install qmd
